<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{_layout}">
<head>
    <meta charset="UTF-8"/>
    <title>Danh sách sản phẩm</title>
</head>
<body>
    <div layout:fragment="content" class="container-fluid" style="max-width: 1200px;">
        
        <div class="card shadow-lg border-0 rounded-4 overflow-hidden mb-5">
            <div class="card-header bg-dark text-white p-4 border-0 d-flex flex-wrap justify-content-between align-items-center gap-3">
                <div>
                    <h3 class="mb-1 fw-bold"><i class="fa-solid fa-boxes-stacked me-2 text-primary"></i>Danh sách sản phẩm</h3>
                    <small class="text-white-50">Xem, tìm kiếm, lọc và phân trang sản phẩm</small>
                </div>
                <div class="d-flex gap-2">
                    <a th:href="@{/cart}" class="btn btn-outline-light shadow-sm px-4 py-2 rounded-pill d-flex align-items-center transition-btn">
                        <i class="fa-solid fa-cart-shopping me-2"></i> <span class="fw-bold">Giỏ Hàng</span>
                    </a>
                    <a sec:authorize="hasAuthority('ROLE_ADMIN')" th:href="@{/products/create}" class="btn btn-primary shadow-sm px-4 py-2 rounded-pill d-flex align-items-center transition-btn">
                        <i class="fa-solid fa-plus me-2"></i> <span class="fw-bold">Thêm sản phẩm</span>
                    </a>
                </div>
            </div>

            <div class="card-body p-0 bg-white">
                
                <div class="p-3 bg-light border-bottom">
                    <form th:action="@{/products}" method="get" class="row g-2 align-items-center">
                        <div class="col-md-4">
                            <div class="input-group">
                                <span class="input-group-text bg-white border-end-0 text-muted"><i class="fa-solid fa-magnifying-glass"></i></span>
                                <input type="text" name="keyword" class="form-control border-start-0 ps-0 focus-none" placeholder="Nhập tên sản phẩm..." th:value="${keyword}">
                            </div>
                        </div>
                        <div class="col-md-3">
                            <select name="categoryId" class="form-select focus-none">
                                <option value="">Tất cả danh mục</option>
                                <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}" th:selected="${categoryId == cat.id}"></option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <select name="sort" class="form-select focus-none">
                                <option value="default" th:selected="${sort == 'default'}">Sắp xếp: Mới nhất</option>
                                <option value="priceAsc" th:selected="${sort == 'priceAsc'}">Giá: Thấp đến Cao</option>
                                <option value="priceDesc" th:selected="${sort == 'priceDesc'}">Giá: Cao đến Thấp</option>
                            </select>
                        </div>
                        <div class="col-md-2 d-grid">
                            <button type="submit" class="btn btn-primary fw-bold"><i class="fa-solid fa-filter me-1"></i> Áp dụng</button>
                        </div>
                    </form>
                </div>

                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0 custom-table">
                        <thead class="bg-light">
                            <tr>
                                <th class="ps-4 py-3 text-muted text-uppercase fw-semibold" style="font-size: 0.75rem; width: 80px;">ID</th>
                                <th class="py-3 text-muted text-uppercase fw-semibold" style="font-size: 0.75rem; width: 100px;">Hình ảnh</th>
                                <th class="py-3 text-muted text-uppercase fw-semibold" style="font-size: 0.75rem;">Sản phẩm</th>
                                <th class="py-3 text-muted text-uppercase fw-semibold" style="font-size: 0.75rem; width: 150px;">Giá bán</th>
                                <th class="py-3 text-muted text-uppercase fw-semibold" style="font-size: 0.75rem; width: 180px;">Danh mục</th>
                                <th class="pe-4 py-3 text-muted text-uppercase fw-semibold text-end" style="font-size: 0.75rem; width: 160px;">Thao tác</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="product : ${listproduct}" class="table-row-hover">
                                <td class="ps-4 text-muted fw-medium fs-6">#<span th:text="${product.id}"></span></td>
                                <td>
                                    <div class="img-thumbnail-wrapper">
                                        <img th:if="${product.image}" th:src="@{/images/{name}(name=${product.image})}" alt="SP"/>
                                        <div th:unless="${product.image}" class="img-placeholder"><i class="fa-regular fa-image"></i></div>
                                    </div>
                                </td>
                                <td><h6 class="mb-0 fw-bold text-dark fs-6" th:text="${product.name}"></h6></td>
                                <td><span class="price-badge"><span th:text="${#numbers.formatInteger(product.price, 3, 'POINT')}"></span> <small>₫</small></span></td>
                                <td><span class="category-badge" th:text="${product.category != null ? product.category.name : 'Chưa phân loại'}"></span></td>
                                <td class="pe-4 text-end">
                                    <div class="d-flex justify-content-end gap-2 align-items-center">
                                        
                                        <form th:action="@{/cart/add/{id}(id=${product.id})}" method="post" class="m-0">
                                            <input type="hidden" name="quantity" value="1">
                                            <button type="submit" class="action-btn action-cart text-success border-success bg-white" title="Thêm vào giỏ">
                                                <i class="fa-solid fa-cart-plus"></i>
                                            </button>
                                        </form>

                                        <th:block sec:authorize="hasAuthority('ROLE_ADMIN')">
                                            <a th:href="@{/products/edit/{id}(id=${product.id})}" class="action-btn action-edit" title="Chỉnh sửa"><i class="fa-solid fa-pen"></i></a>
                                            <a th:href="@{/products/delete/{id}(id=${product.id})}" class="action-btn action-delete" onclick="return confirm('Bạn có chắc muốn xóa?');" title="Xóa"><i class="fa-solid fa-trash"></i></a>
                                        </th:block>

                                    </div>
                                </td>
                            </tr>
                            
                            <tr th:if="${#lists.isEmpty(listproduct)}">
                                <td colspan="6" class="text-center py-5 bg-white">
                                    <div class="empty-state py-4">
                                        <div class="empty-icon mb-3 text-primary opacity-50"><i class="fa-solid fa-box-open" style="font-size: 4rem;"></i></div>
                                        <h5 class="fw-bold text-dark mb-2">Không tìm thấy sản phẩm</h5>
                                        <p class="text-muted mb-4">Hãy thử tìm kiếm với từ khóa hoặc danh mục khác.</p>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div class="p-4 bg-white border-top d-flex justify-content-center" th:if="${totalPages > 1}">
                    <nav aria-label="Page navigation">
                        <ul class="pagination mb-0 shadow-sm rounded-3">
                            <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled'">
                                <a class="page-link px-3" th:href="@{/products(keyword=${keyword}, categoryId=${categoryId}, sort=${sort}, page=${currentPage - 1})}"><i class="fa-solid fa-chevron-left me-1"></i> Trước</a>
                            </li>
                            <li class="page-item" th:each="i : ${#numbers.sequence(1, totalPages)}" th:classappend="${currentPage == i} ? 'active'">
                                <a class="page-link fw-medium" th:href="@{/products(keyword=${keyword}, categoryId=${categoryId}, sort=${sort}, page=${i})}" th:text="${i}"></a>
                            </li>
                            <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled'">
                                <a class="page-link px-3" th:href="@{/products(keyword=${keyword}, categoryId=${categoryId}, sort=${sort}, page=${currentPage + 1})}">Sau <i class="fa-solid fa-chevron-right ms-1"></i></a>
                            </li>
                        </ul>
                    </nav>
                </div>

            </div>
        </div>

        <style>
            .custom-table th { border-bottom: 2px solid #e2e8f0; background-color: #f8fafc; }
            .custom-table td { vertical-align: middle; border-bottom: 1px solid #f1f5f9; transition: background-color 0.2s ease; }
            .table-row-hover:hover td { background-color: rgba(13, 110, 253, 0.03); }
            .img-thumbnail-wrapper { width: 60px; height: 60px; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border: 1px solid rgba(0,0,0,0.05); background: #f8fafc; display: flex; align-items: center; justify-content: center; }
            .img-thumbnail-wrapper img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s ease; }
            .table-row-hover:hover .img-thumbnail-wrapper img { transform: scale(1.1); }
            .img-placeholder { color: #cbd5e1; font-size: 1.25rem; }
            .price-badge { display: inline-block; background: rgba(13, 110, 253, 0.1); color: #0d6efd; font-weight: 700; padding: 0.35rem 0.75rem; border-radius: 8px; }
            .category-badge { display: inline-block; background: #f1f5f9; color: #475569; font-size: 0.85rem; font-weight: 500; padding: 0.35rem 0.75rem; border-radius: 99px; border: 1px solid #e2e8f0; }
            .action-btn { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border-radius: 10px; transition: all 0.2s ease; background: #f8fafc; border: 1px solid #e2e8f0; color: #64748b; }
            
            /* CSS RIÊNG CHO NÚT GIỎ HÀNG */
            .action-cart:hover { background: #198754 !important; color: white !important; border-color: #198754 !important; transform: translateY(-2px); box-shadow: 0 4px 6px -1px rgba(25, 135, 84, 0.2); }
            
            .action-edit:hover { background: #0d6efd; color: white; border-color: #0d6efd; transform: translateY(-2px); box-shadow: 0 4px 6px -1px rgba(13, 110, 253, 0.2); }
            .action-delete:hover { background: #ef4444; color: white; border-color: #ef4444; transform: translateY(-2px); box-shadow: 0 4px 6px -1px rgba(239, 68, 68, 0.2); }
            .transition-btn { transition: transform 0.2s ease, box-shadow 0.2s ease; }
            .transition-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(13, 110, 253, 0.3) !important; }
            .focus-none:focus { box-shadow: none; border-color: #0d6efd; }
            .pagination .page-link { color: #4a5568; border-color: #e2e8f0; padding: 0.5rem 1rem; }
            .pagination .page-item.active .page-link { background-color: #0d6efd; border-color: #0d6efd; color: white; }
            .pagination .page-item.disabled .page-link { color: #cbd5e0; background-color: #f8fafc; }
        </style>
    </div>
</body>
</html>
