<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Khóa Học Của Tôi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" th:href="@{/home}">Course Registration</a>
            <div class="d-flex align-items-center">
                <span class="text-white me-3">Xin chào, <b th:text="${username}">User</b>!</span>
                <a th:href="@{/home}" class="btn btn-light me-2">Trang Chủ</a>
                <form th:action="@{/logout}" method="post" class="m-0">
                    <button type="submit" class="btn btn-danger">Đăng xuất</button>
                </form>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <h2 class="mb-4">Học phần bạn đã đăng ký</h2>
        
        <div th:if="${#lists.isEmpty(enrollments)}" class="alert alert-info">
            Bạn chưa đăng ký học phần nào! <a th:href="@{/home}">Đăng ký ngay</a>.
        </div>

        <table th:if="${!#lists.isEmpty(enrollments)}" class="table table-bordered table-striped shadow-sm bg-white">
            <thead class="table-primary">
                <tr>
                    <th>STT</th>
                    <th>Tên học phần</th>
                    <th>Số tín chỉ</th>
                    <th>Giảng viên</th>
                    <th>Ngày đăng ký</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="enrollment, iterStat : ${enrollments}">
                    <td th:text="${iterStat.count}"></td>
                    <td th:text="${enrollment.course.name}"></td>
                    <td th:text="${enrollment.course.credits}"></td>
                    <td th:text="${enrollment.course.lecturer}"></td>
                    <td th:text="${#temporals.format(enrollment.enroll_date, 'dd-MM-yyyy HH:mm')}"></td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
