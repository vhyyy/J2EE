<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Trang Chủ - Course Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" th:href="@{/home}">Course Registration</a>
            
            <form class="d-flex mx-auto" style="width: 40%;" th:action="@{/home}" method="get">
                <input class="form-control me-2" type="search" name="keyword" placeholder="Tìm tên môn học..." th:value="${keyword}">
                <button class="btn btn-outline-success" type="submit">Search</button>
            </form>
            
            <div class="d-flex align-items-center">
                <div th:if="${!isLoggedIn}">
                    <a th:href="@{/login}" class="btn btn-outline-light me-2">Đăng nhập</a>
                    <a th:href="@{/register}" class="btn btn-light">Đăng ký</a>
                </div>

                <div th:if="${isLoggedIn}" class="d-flex align-items-center">
                    <span class="text-white me-3">Chào, <b th:text="${username}">User</b>!</span>
                    
                    <div th:if="${isStudent}">
                        <a th:href="@{/my-courses}" class="btn btn-info me-2 text-white">My Courses</a>
                    </div>

                    <div th:if="${isAdmin}">
                        <a th:href="@{/admin/courses}" class="btn btn-warning me-2">Admin Panel</a>
                    </div>
                    
                    <form th:action="@{/logout}" method="post" class="m-0">
                        <button type="submit" class="btn btn-danger">Đăng xuất</button>
                    </form>
                </div>
            </div>
        </div>
    </nav>

    <div class="container">
        <h2 class="text-center mb-4" th:text="${keyword != null} ? 'Kết quả tìm kiếm cho: ' + ${keyword} : 'Danh Sách Học Phần'"></h2>
        
        <div th:if="${#lists.isEmpty(courses)}" class="alert alert-warning text-center shadow-sm">
            Không tìm thấy học phần nào khớp với từ khóa của bạn! 
            <br> <a th:href="@{/home}" class="btn btn-link">Quay lại danh sách chính</a>
        </div>

        <div class="row">
            <div class="col-md-4 mb-4" th:each="course : ${courses}">
                <div class="card h-100 shadow-sm border-0">
                    <img th:src="${course.image != null and !course.image.isEmpty()} ? ${course.image} : 'https://via.placeholder.com/300x200?text=No+Image'" class="card-img-top" alt="Course Image" style="height: 200px; object-fit: cover;">
                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title text-primary" th:text="${course.name}">Tên học phần</h5>
                        <p class="card-text mb-1 text-muted"><strong>Giảng viên:</strong> <span th:text="${course.lecturer}"></span></p>
                        <p class="card-text mb-3"><strong>Số tín chỉ:</strong> <span th:text="${course.credits}"></span></p>
                        
                        <div class="mt-auto">
                            <a th:if="${isStudent}" th:href="@{/enroll/{id}(id=${course.id})}" class="btn btn-primary w-100" onclick="return confirm('Bạn có chắc muốn đăng ký môn này?');">Đăng ký ngay</a>
                            
                            <button th:if="${!isLoggedIn}" class="btn btn-secondary w-100" disabled>Đăng nhập để đăng ký</button>
                            <button th:if="${isAdmin}" class="btn btn-outline-secondary w-100" disabled>Admin không được đăng ký</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <nav th:if="${keyword == null and totalPages > 1}" class="mt-4">
            <ul class="pagination justify-content-center">
                <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                    <a class="page-link" th:href="@{/home(page=${currentPage - 1})}">Trước</a>
                </li>
                <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}" th:classappend="${currentPage == i} ? 'active'">
                    <a class="page-link" th:href="@{/home(page=${i})}" th:text="${i + 1}"></a>
                </li>
                <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                    <a class="page-link" th:href="@{/home(page=${currentPage + 1})}">Sau</a>
                </li>
            </ul>
        </nav>
        
        <div class="text-center mt-3" th:if="${keyword != null}">
            <a th:href="@{/home}" class="btn btn-secondary">Xem tất cả môn học</a>
        </div>
    </div>
</body>
</html>
