<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Form Học Phần</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        <h4 th:text="${course.id == null ? 'Thêm mới học phần' : 'Cập nhật học phần'}"></h4>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/admin/courses/save}" th:object="${course}" method="post" enctype="multipart/form-data">
                            <input type="hidden" th:field="*{id}">
                            <input type="hidden" th:field="*{image}">
                            
                            <div class="mb-3">
                                <label class="form-label">Tên học phần:</label>
                                <input type="text" class="form-control" th:field="*{name}" required>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label">Ảnh minh họa:</label>
                                <input type="file" class="form-control" name="imageFile" accept="image/png, image/jpeg, image/jpg">
                                <small class="text-muted" th:if="${course.image != null}">Đã có ảnh. Chọn ảnh mới để thay đổi.</small>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label">Số tín chỉ:</label>
                                <input type="number" class="form-control" th:field="*{credits}" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Giảng viên:</label>
                                <input type="text" class="form-control" th:field="*{lecturer}" required>
                            </div>
                            
                            <button type="submit" class="btn btn-success w-100">Lưu dữ liệu</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
