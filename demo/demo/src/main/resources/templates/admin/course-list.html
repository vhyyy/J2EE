<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Học phần</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2>Quản lý Học Phần (ADMIN)</h2>
            <a th:href="@{/admin/courses/create}" class="btn btn-success">Thêm mới (Create)</a>
        </div>
        <table class="table table-bordered table-striped shadow-sm bg-white">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Tên học phần</th>
                    <th>Số tín chỉ</th>
                    <th>Giảng viên</th>
                    <th>Hành động</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="course : ${courses}">
                    <td th:text="${course.id}"></td>
                    <td th:text="${course.name}"></td>
                    <td th:text="${course.credits}"></td>
                    <td th:text="${course.lecturer}"></td>
                    <td>
                        <a th:href="@{/admin/courses/edit/{id}(id=${course.id})}" class="btn btn-sm btn-primary">Sửa (Update)</a>
                        <a th:href="@{/admin/courses/delete/{id}(id=${course.id})}" class="btn btn-sm btn-danger" onclick="return confirm('Bạn có chắc muốn xóa?');">Xóa (Delete)</a>
                    </td>
                </tr>
            </tbody>
        </table>
        <a th:href="@{/home}" class="btn btn-secondary">Quay lại Trang chủ</a>
    </div>
</body>
</html>
